<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Питомец</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0b0b0e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }
        .container {
            background: #1a1a24;
            border-radius: 28px;
            padding: 24px 20px 30px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 8px 32px rgba(124, 92, 191, 0.25);
            border: 1px solid #3c3a5c;
            text-align: center;
        }
        .pet-name { font-size: 22px; font-weight: 700; color: #e0d7ff; margin-bottom: 4px; }
        .emoji { font-size: 80px; margin: 4px 0; display: block; }
        .stage { font-size: 16px; font-weight: 600; color: #a8a0c2; margin-bottom: 6px; }
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px 12px;
            background: #23213a;
            border-radius: 16px;
            padding: 12px 14px;
            margin: 12px 0 18px;
            font-size: 14px;
            text-align: left;
            color: #c8c0e0;
        }
        .btn-group { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 12px; }
        .btn {
            background: #7c5cbf;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 10px 16px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            flex: 1 0 auto;
            min-width: 50px;
            transition: 0.2s;
            box-shadow: 0 0 16px rgba(124, 92, 191, 0.3);
        }
        .btn:active { transform: scale(0.95); }
        .btn-green { background: #4a9b7c; box-shadow: 0 0 16px rgba(74, 155, 124, 0.3); }
        .btn-blue { background: #4a7c9b; box-shadow: 0 0 16px rgba(74, 124, 155, 0.3); }
        .btn-orange { background: #b08a4a; color: #e0d7ff; box-shadow: 0 0 16px rgba(176, 138, 74, 0.3); }
        .btn-pink { background: #bf5c8a; box-shadow: 0 0 16px rgba(191, 92, 138, 0.3); }
        .btn-game { background: #6c4a8b; box-shadow: 0 0 16px rgba(108, 74, 139, 0.3); }

        .message { margin-top: 10px; font-size: 13px; color: #b080ff; min-height: 20px; transition: color 0.3s; }
        .footer { margin-top: 10px; font-size: 11px; color: #5a507a; }
        .page { display: none; }
        .page.active { display: block; }
        .back-btn {
            background: #3c3a5c;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 8px 16px;
            font-size: 13px;
            cursor: pointer;
            margin-bottom: 12px;
        }
        .back-btn:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div class="container">
        <!-- Страница питомца -->
        <div id="mainPage" class="page active">
            <div class="pet-name" id="petName">Питомец</div>
            <span id="petEmoji" class="emoji">🐱</span>
            <div id="stage" class="stage">Стадия: —</div>

            <div class="stats">
                <span>🥩 Голод: <b id="golod">—</b></span>
                <span>🍽 Счастье: <b id="schastie">—</b></span>
                <span>🫧 Гигиена: <b id="gigiena">—</b></span>
                <span>⚡ Энергия: <b id="energia">—</b></span>
                <span>📏 Дисциплина: <b id="disciplina">—</b></span>
                <span>🐾 Лапки: <b id="lapki">—</b></span>
            </div>

            <div class="btn-group">
                <button class="btn btn-green" onclick="action('feed')">🍽</button>
                <button class="btn btn-orange" onclick="action('play')">⚾</button>
                <button class="btn btn-blue" onclick="action('wash')">🫧</button>
                <button class="btn" onclick="action('sleep')">💤</button>
                <button class="btn btn-pink" onclick="action('train')">⚡</button>
            </div>

            <div class="btn-group">
                <button class="btn btn-game" onclick="showGames()">🎮 Игры</button>
            </div>

            <div id="message" class="message">Нажми кнопку, чтобы взаимодействовать</div>
            <div class="footer">призрачный питомец</div>
        </div>

        <!-- Страница игр -->
        <div id="gamesPage" class="page">
            <button class="back-btn" onclick="showMain()">← Назад</button>
            <div class="pet-name" style="font-size:20px;">🎮 Игры</div>
            <div style="margin-top:16px; display:flex; flex-direction:column; gap:12px;">
                <button class="btn" onclick="playGame('dice')" style="width:100%;">🎲 Кости</button>
                <button class="btn" onclick="playGame('guess_easy')" style="width:100%;">🔢 Угадай число (простая)</button>
                <button class="btn" onclick="playGame('guess_hard')" style="width:100%;">🧠 Угадай число (хард)</button>
            </div>
            <div id="gameMessage" class="message" style="margin-top:16px;"></div>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        let tg = window.Telegram.WebApp;
        let user_id = tg.initDataUnsafe?.user?.id;

        const petEmojis = {
            "кошка": "🐱",
            "собака": "🐶",
            "лиса": "🦊",
            "панда": "🐼",
            "кролик": "🐇",
            "ёжик": "🦔",
            "пингвин": "🐧"
        };

        function showMain() {
            document.getElementById('mainPage').classList.add('active');
            document.getElementById('gamesPage').classList.remove('active');
        }

        function showGames() {
            document.getElementById('mainPage').classList.remove('active');
            document.getElementById('gamesPage').classList.add('active');
        }

        function showNotification(text, isError = true) {
            const msg = document.getElementById('message');
            msg.innerText = text;
            msg.style.color = isError ? '#b080ff' : '#7c5cbf';
            setTimeout(() => { msg.style.color = '#b080ff'; }, 5000);
        }

        function loadPet() {
            if (!user_id) {
                showNotification('❌ Не удалось определить пользователя');
                return;
            }
            fetch(`/api/pet/${user_id}`)
                .then(res => res.json())
                .then(data => {
                    if (data.error) {
                        showNotification('❌ ' + data.error);
                        return;
                    }
                    document.getElementById('petName').innerText = data.pet_name || 'Питомец';
                    document.getElementById('stage').innerText = 'Стадия: ' + data.stage;
                    document.getElementById('petEmoji').innerText = petEmojis[data.pet_type] || '🐾';
                    document.getElementById('golod').innerText = data.голод;
                    document.getElementById('schastie').innerText = data.счастье;
                    document.getElementById('gigiena').innerText = data.гигиена;
                    document.getElementById('energia').innerText = data.энергия;
                    document.getElementById('disciplina').innerText = data.дисциплина;
                    document.getElementById('lapki').innerText = data.лапки;
                })
                .catch(() => { showNotification('❌ Ошибка загрузки'); });
        }

        function action(type) {
            if (!user_id) {
                showNotification('❌ Нет пользователя');
                return;
            }
            showNotification('⏳ ...', false);
            fetch(`/api/${type}/${user_id}`, { method: 'POST' })
                .then(res => res.json().then(data => ({ status: res.status, body: data })))
                .then(({ status, body }) => {
                    if (status === 400) {
                        showNotification('⚠️ ' + (body.error || 'Ошибка'));
                        return;
                    }
                    showNotification('✅ ' + (body.message || 'Готово!'), false);
                    loadPet();
                })
                .catch(() => { showNotification('❌ Ошибка'); });
        }

        function playGame(game) {
            if (!user_id) {
                document.getElementById('gameMessage').innerText = '❌ Нет пользователя';
                return;
            }
            tg.close();
            window.location.href = `tg://resolve?domain=${game}`;
        }

        tg.ready();
        loadPet();
    </script>
</body>
</html>
