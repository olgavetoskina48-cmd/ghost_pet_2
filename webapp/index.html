<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Питомец</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0b0b0e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 6px;
        }
        .container {
            background: #1a1a24;
            border-radius: 32px;
            padding: 18px 14px 26px;
            max-width: 440px;
            width: 100%;
            min-height: 96vh;
            box-shadow: 0 8px 32px rgba(124, 92, 191, 0.3);
            border: 1px solid #3c3a5c;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .pet-name {
            font-size: 28px;
            font-weight: 700;
            color: #e0d7ff;
            margin-bottom: 2px;
        }
        .emoji {
            font-size: 140px;
            margin: 4px 0;
            display: block;
            line-height: 1.1;
        }
        .stage {
            font-size: 20px;
            font-weight: 600;
            color: #a8a0c2;
            margin-bottom: 6px;
        }
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px 14px;
            background: #23213a;
            border-radius: 18px;
            padding: 18px 20px;
            margin: 10px 0 18px;
            font-size: 18px;
            text-align: left;
            color: #c8c0e0;
        }
        .stats b {
            color: #e0d7ff;
        }
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 14px;
        }
        .btn {
            background: #7c5cbf;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 14px 22px;
            font-size: 20px;
            font-weight: 500;
            cursor: pointer;
            flex: 1 0 auto;
            min-width: 60px;
            transition: 0.2s;
            box-shadow: 0 0 16px rgba(124, 92, 191, 0.3);
        }
        .btn:active { transform: scale(0.95); }
        .btn-green { background: #4a9b7c; }
        .btn-blue { background: #4a7c9b; }
        .btn-orange { background: #b08a4a; color: #e0d7ff; }
        .btn-pink { background: #bf5c8a; }
        .btn-game { background: #6c4a8b; }

        .message {
            margin-top: 10px;
            font-size: 16px;
            color: #b080ff;
            min-height: 24px;
        }
        .footer {
            margin-top: 12px;
            font-size: 14px;
            color: #5a507a;
        }
        .page { display: none; }
        .page.active { display: block; }
        .back-btn {
            background: #3c3a5c;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 12px 20px;
            font-size: 17px;
            cursor: pointer;
            margin-bottom: 14px;
            width: fit-content;
        }
        .back-btn:active { transform: scale(0.95); }
        input {
            background: #23213a;
            border: 1px solid #3c3a5c;
            color: #e0d7ff;
            padding: 14px;
            border-radius: 40px;
            width: 80%;
            margin: 10px 0;
            font-size: 20px;
            outline: none;
        }
        .game-result {
            margin-top: 16px;
            font-size: 20px;
            color: #b080ff;
            white-space: pre-line;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="mainPage" class="page active">
            <div class="pet-name" id="petName">Питомец</div>
            <span id="petEmoji" class="emoji">🐱</span>
            <div id="stage" class="stage">Стадия: —</div>
            <div class="stats">
                <span>🥩 Голод: <b id="golod">—</b></span>
                <span>🍽 Счастье: <b id="schastie">—</b></span>
                <span>🫧 Гигиена: <b id="gigiena">—</b></span>
                <span>⚡ Энергия: <b id="energia">—</b></span>
                <span>📏 Дисциплина: <b id="disciplina">—</b></span>
                <span>🐾 Лапки: <b id="lapki">—</b></span>
            </div>
            <div class="btn-group">
                <button class="btn btn-green" onclick="action('feed')">🍽</button>
                <button class="btn btn-orange" onclick="action('play')">⚾</button>
                <button class="btn btn-blue" onclick="action('wash')">🫧</button>
                <button class="btn" onclick="action('sleep')">💤</button>
                <button class="btn btn-pink" onclick="action('train')">⚡</button>
            </div>
            <div class="btn-group">
                <button class="btn btn-game" onclick="showGames()">🎮 Игры</button>
            </div>
            <div id="message" class="message">Нажми кнопку, чтобы взаимодействовать</div>
            <div class="footer">призрачный питомец</div>
        </div>

        <div id="gamesPage" class="page">
            <button class="back-btn" onclick="showMain()">← Назад</button>
            <div class="pet-name" style="font-size:24px;">🎮 Игры</div>
            <div style="margin-top:20px; display:flex; flex-direction:column; gap:14px;">
                <button class="btn" onclick="startGame('dice')" style="width:100%; font-size:22px;">🎲 Кости</button>
                <button class="btn" onclick="startGame('guess_easy')" style="width:100%; font-size:22px;">🔢 Угадай число (1–10)</button>
                <button class="btn" onclick="startGame('guess_hard')" style="width:100%; font-size:22px;">🧠 Угадай число (1–100)</button>
            </div>
            <div id="gameMessage" class="message" style="margin-top:20px;"></div>
        </div>

        <div id="gamePage" class="page">
            <button class="back-btn" onclick="exitGame()">← Выйти</button>
            <div id="gameTitle" class="pet-name" style="font-size:24px;">Игра</div>
            <div id="gameContent" style="margin-top:20px;"></div>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        let tg = window.Telegram.WebApp;
        let user_id = tg.initDataUnsafe?.user?.id;
        let currentGame = null;

        const petEmojis = {
            "кошка": "🐱",
            "собака": "🐶",
            "лиса": "🦊",
            "панда": "🐼",
            "кролик": "🐇",
            "ёжик": "🦔",
            "пингвин": "🐧"
        };

        function showMain() {
            document.getElementById('mainPage').classList.add('active');
            document.getElementById('gamesPage').classList.remove('active');
            document.getElementById('gamePage').classList.remove('active');
        }

        function showGames() {
            document.getElementById('mainPage').classList.remove('active');
            document.getElementById('gamesPage').classList.add('active');
            document.getElementById('gamePage').classList.remove('active');
        }

        function showGame() {
            document.getElementById('mainPage').classList.remove('active');
            document.getElementById('gamesPage').classList.remove('active');
            document.getElementById('gamePage').classList.add('active');
        }

        function exitGame() {
            currentGame = null;
            showGames();
        }

        function showNotification(text, isError = true) {
            const msg = document.getElementById('message');
            msg.innerText = text;
            msg.style.color = isError ? '#b080ff' : '#7c5cbf';
            setTimeout(() => { msg.style.color = '#b080ff'; }, 5000);
        }

        function loadPet() {
            if (!user_id) {
                showNotification('❌ Не удалось определить пользователя');
                return;
            }
            fetch(`/api/pet/${user_id}`)
                .then(res => res.json())
                .then(data => {
                    if (data.error) {
                        showNotification('❌ ' + data.error);
                        return;
                    }
                    document.getElementById('petName').innerText = data.pet_name || 'Питомец';
                    document.getElementById('stage').innerText = 'Стадия: ' + data.stage;
                    document.getElementById('petEmoji').innerText = petEmojis[data.pet_type] || '🐾';
                    document.getElementById('golod').innerText = data.голод;
                    document.getElementById('schastie').innerText = data.счастье;
                    document.getElementById('gigiena').innerText = data.гигиена;
                    document.getElementById('energia').innerText = data.энергия;
                    document.getElementById('disciplina').innerText = data.дисциплина;
                    document.getElementById('lapki').innerText = data.лапки;
                })
                .catch(() => { showNotification('❌ Ошибка загрузки'); });
        }

        function action(type) {
            if (!user_id) {
                showNotification('❌ Нет пользователя');
                return;
            }
            showNotification('⏳ ...', false);
            fetch(`/api/${type}/${user_id}`, { method: 'POST' })
                .then(res => res.json().then(data => ({ status: res.status, body: data })))
                .then(({ status, body }) => {
                    if (status === 400) {
                        showNotification('⚠️ ' + (body.error || 'Ошибка'));
                        return;
                    }
                    showNotification('✅ ' + (body.message || 'Готово!'), false);
                    loadPet();
                })
                .catch(() => { showNotification('❌ Ошибка'); });
        }

        function startGame(game) {
            if (!user_id) {
                document.getElementById('gameMessage').innerText = '❌ Нет пользователя';
                return;
            }
            currentGame = game;
            const title = document.getElementById('gameTitle');
            const content = document.getElementById('gameContent');
            
            if (game === 'dice') {
                title.innerText = '🎲 Кости';
                content.innerHTML = `
                    <button class="btn" onclick="diceRoll()" style="width:100%;">Кинуть кубик</button>
                    <div id="diceResult" class="game-result"></div>
                `;
            } else if (game === 'guess_easy' || game === 'guess_hard') {
                const max = game === 'guess_easy' ? 10 : 100;
                const mode = game === 'guess_easy' ? 'easy' : 'hard';
                title.innerText = game === 'guess_easy' ? '🔢 Угадай (1–10)' : '🧠 Угадай (1–100)';
                content.innerHTML = `
                    <div style="font-size:18px;">Введи число от 1 до ${max}</div>
                    <input type="number" id="guessInput" min="1" max="${max}">
                    <button class="btn" onclick="guessNumber()" style="width:100%;">Проверить</button>
                    <div id="guessResult" class="game-result"></div>
                `;
                fetch(`/api/start_guess/${user_id}/${mode}`, { method: 'POST' })
                    .then(res => res.json())
                    .then(data => {
                        if (data.error) {
                            document.getElementById('guessResult').innerText = '❌ ' + data.error;
                        }
                    })
                    .catch(() => {
                        document.getElementById('guessResult').innerText = '❌ Ошибка запуска игры';
                    });
            }
            showGame();
        }

        function diceRoll() {
            if (!user_id) return;
            fetch(`/api/dice/${user_id}`, { method: 'POST' })
                .then(res => res.json())
                .then(data => {
                    const result = document.getElementById('diceResult');
                    const emojis = {1: '⚀', 2: '⚁', 3: '⚂', 4: '⚃', 5: '⚄', 6: '⚅'};
                    let text = `🎲 Ты: ${emojis[data.user_roll]} (${data.user_roll})\n🎲 Бот: ${emojis[data.bot_roll]} (${data.bot_roll})`;
                    if (data.win) text += `\n✅ Ты выиграл! +${data.bonus} лапок!`;
                    else if (data.lose) text += '\n❌ Ты проиграл! Ничего не заработал.';
                    else text += '\n🤝 Ничья! Никто не получил лапок.';
                    result.innerText = text;
                    loadPet();
                })
                .catch(() => {
                    document.getElementById('diceResult').innerText = '❌ Ошибка';
                });
        }

        function guessNumber() {
            if (!user_id) return;
            const input = document.getElementById('guessInput');
            const guess = parseInt(input.value);
            if (isNaN(guess)) {
                document.getElementById('guessResult').innerText = '❌ Введи число!';
                return;
            }
            fetch(`/api/guess/${user_id}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ guess: guess })
            })
            .then(res => res.json())
            .then(data => {
                const result = document.getElementById('guessResult');
                if (data.win) {
                    result.innerText = `🎉 Ты угадал! +${data.bonus} лапок!`;
                    loadPet();
                } else if (data.lose) {
                    result.innerText = `❌ Ты не угадал! Загаданное число было ${data.number}.`;
                    loadPet();
                } else {
                    const emoji = data.hint === 'больше' ? '📈' : '📉';
                    result.innerText = `${emoji} Загаданное число ${data.hint}. Осталось попыток: ${data.attempts_left}`;
                }
                input.value = '';
            })
            .catch(() => {
                document.getElementById('guessResult').innerText = '❌ Ошибка';
            });
        }

        tg.ready();
        loadPet();
    </script>
</body>
    </html>
